<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Musica - Lecteur WaveSurfer</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios@1.4.0/dist/axios.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
  .container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
  .mode-switch { position: absolute; top: 20px; right: 20px; }
  
  .waveform-wrapper {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 250px;
    margin: 20px 0;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }
  
  .album-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 1;
    transition: clip-path 0.1s linear;
  }
  
  #waveform { 
    position: relative;
    width: 100%; 
    height: 100%;
    z-index: 2;
    opacity: 0.5;
    filter: grayscale(100%);
  }
  
  .controls button { margin: 5px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  /* NEW BOUTON ROND CONTROLS OVERLAY */
/* ----------- Player Controls Overlay ----------- */
.player-controls {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 20px;
  z-index: 3;
  opacity: 0;                 /* invisible par défaut sur PC */
  transition: opacity 0.3s ease;
}

.waveform-wrapper:hover .player-controls {
  opacity: 1;                 /* apparition au hover sur PC */
}

/* Mobile : toujours visible */
@media (hover: none) {
  .player-controls {
    opacity: 1;
  }
}

.player-controls button {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  -webkit-tap-highlight-color: transparent; /* supprime le bleu/overlay mobile */
  outline: none;
  border: none;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  background: rgba(0,0,0,0.6);
  cursor: pointer;
  backdrop-filter: blur(5px);
  transition: all 0.2s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0;
}

.player-controls .play-btn {
  width: 70px;
  height: 70px;
}

.player-controls button svg {
  width: 60%;
  height: 60%;
}

.player-controls button:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.1);
}

.player-controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.feedback-overlay {
  position: absolute;
  bottom: 15px;
  right: 15px;
  display: flex;
  gap: 12px;
  z-index: 4;
}

.feedback-btn {
  appearance: none;
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.5);
  color: white;
  cursor: pointer;
  backdrop-filter: blur(5px);
  transition: all 0.2s ease;
}

.feedback-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.1);
}

.feedback-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

/* Couleurs spécifiques */
.like-btn { background: rgba(0,200,0,0.5); }
.dislike-btn { background: rgba(200,0,0,0.5); }
/* new for mix*/
.mix-list {
  width: 100%;
  padding: 5px;
}

.mix-item {
  display: flex;
  align-items: center;
  font-size: 14px;
  padding: 6px 0;
}

.mix-name {
  max-width: 45%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dots {
  flex: 1;
  border-bottom: 1px dotted rgba(255,255,255,0.3);
  margin: 0 6px;
}

.mix-play {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  margin-right: 6px;
}

.mix-time {
  font-size: 12px;
  opacity: 0.7;
  min-width: 60px;
}
  
</style>
</head>
<body>
  <div id="app">
    <div class="container" :style="{ backgroundColor: bgColor, color: textColor }">

      <!-- Mode switch -->
      <div class="mode-switch">
    <!--    <button @click="toggleMode" :disabled="isLoading">  -->
        <button @click="toggleMode">
          {{ mode === 'mp3' ? 'Go to MIX list' : 'Back to single MP3' }}
        </button>
      </div>

      <!-- Titre chanson -->
      <h1 v-if="mode === 'mp3'">{{ songName }}</h1>

      <!-- Bloc MP3 -->
      <div v-if="mode === 'mp3'" class="waveform-wrapper">

        <!-- Image album -->
        <div class="album-image"
             :style="{ 
               backgroundImage: `url('${imageUrl}')`,
               clipPath: `inset(0 ${100 - progressPercent}% 0 0)`
             }">
        </div>

        <!-- Waveform -->
        <div id="waveform"></div>

        <!-- Boutons overlay -->
        <div class="player-controls">
          <button @click="previousSong" :disabled="isLoading">
            <svg viewBox="0 0 24 24"><polygon points="11,12 22,4 22,20" fill="white"/><rect x="2" y="4" width="3" height="16" fill="white"/></svg>
          </button>

          <button type="button" class="play-btn" @click="togglePlay" :disabled="!isSongReady || isLoading">
            <svg v-if="!isPlaying" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="white"/></svg>
            <svg v-else viewBox="0 0 24 24"><rect x="5" y="3" width="5" height="18" fill="white"/><rect x="14" y="3" width="5" height="18" fill="white"/></svg>
          </button>

          <button @click="replaySong" :disabled="!isSongReady || isLoading">
            <svg viewBox="0 0 24 24"><path d="M12 5V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="white"/></svg>
          </button>

          <button @click="nextSong" :disabled="isLoading">
            <svg viewBox="0 0 24 24"><polygon points="13,12 2,4 2,20" fill="white"/><rect x="19" y="4" width="3" height="16" fill="white"/></svg>
          </button>
        </div>

      </div> <!-- fin waveform-wrapper -->
        <!-- Temps -->
        <div v-if="mode === 'mp3'" class="time-display">{{ currentTime }} / {{ duration }}</div>

      <!-- Lecteur audio pour mix -->
      <audio ref="mixPlayer" style="display:none"></audio>

      <!-- Bloc Mix OLD       
<div v-if="mode === 'mix'" class="mix-list">
  <div v-for="mix in mixList" :key="mix.fileName" class="mix-item">
    <div>{{ mix.name }}</div>
    <button @click="playMix(mix.url, mix)">
      {{ currentMix === mix.fileName && isPlaying ? '⏸' : '▶' }}
    </button>
  </div>
</div>-->

<div v-if="mode === 'mix'" class="mix-list">
  <div v-for="mix in mixList" :key="mix.fileName" class="mix-item">
    <span class="mix-name">{{ mix.name }}</span>
    <span class="dots"></span>
    <button class="mix-play" @click="playMix(mix.url, mix)">
      {{ currentMix === mix.fileName && isPlaying ? '⏸' : '▶' }}
    </button>
    <span class="mix-time">
      {{ formatTime(mixCurrentTime) }} / {{ formatTime(mixDuration) }}
    </span>
  </div>
</div>
      
      <!-- Feedback overlay -->
        <div class="feedback-overlay">
          <button class="feedback-btn like-btn" @click="likeSong" :disabled="hasVoted">❤️ {{ globalLikeCount }}</button>
          <button class="feedback-btn dislike-btn" @click="dislikeSong" :disabled="hasVoted">👎 {{ globalDislikeCount }}</button>
        </div>

        <!-- Message “Clique pour commencer” -->
        <div v-if="!userInteracted && isSongReady" class="start-message">
          👆 Start music
        </div>


    </div> <!-- fin container -->
  </div> <!-- fin app -->

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      mode: 'mp3',
      songName: 'Chargement...',
      songUrl: '',
      waveformUrl: '',
      imageUrl: '',
      fileName: '',
      wavesurfer: null,
      isPlaying: false,
      isSongReady: false,
      isLoading: false,
      currentTime: '0:00',
      duration: '0:00',
      hasVoted: false,
      globalLikeCount: 0,
      globalDislikeCount: 0,
      bgColor: '#000',
      textColor: '#fff',
      userInteracted: false,
      progressPercent: 0,
      mixList: [],      // la liste des mixes depuis /api/mix-list
       currentMix: null,
      mixCurrentTime: 0,   //new
    mixDuration: 0 // new
    };
  },
  mounted() {
    this.wavesurfer = WaveSurfer.create({
      container: '#waveform',
      waveColor: '#FFFFFF',
//      progressColor: 'rgba(255, 100, 100, 0.3)',
      progressColor: 'transparent',
      barWidth: 2,
      height: 250,
      responsive: true,
    });

    this.wavesurfer.on('audioprocess', () => {
      if (this.isPlaying) {
        this.currentTime = this.formatTime(this.wavesurfer.getCurrentTime());
        
        const duration = this.wavesurfer.getDuration();
        const currentTime = this.wavesurfer.getCurrentTime();
        if (duration > 0) {
          this.progressPercent = (currentTime / duration) * 100;
        }
      }
    });

    this.wavesurfer.on('finish', () => {
      this.isPlaying = false;
      this.currentTime = this.duration;
      this.progressPercent = 100;
       // Appeler nextSong uniquement si on est en mode mp3
      if (this.mode === 'mp3') {
      this.nextSong();
       }
    });

    document.addEventListener('click', this.unlockAutoPlay);
    document.addEventListener('touchstart', this.unlockAutoPlay);
    document.addEventListener('keydown', this.unlockAutoPlay);

// Charger la prochaine chanson uniquement si on est en mode mp3
  if (this.mode === 'mp3') {
    this.loadNextSong();
  }
     // 🔹 Charger la liste des mixes
  axios.get('/api/mix-list', { withCredentials: true })
    .then(res => {
      this.mixList = res.data;
    })
    .catch(err => console.error('Erreur /api/mix-list:', err));

    //also for time ibmix
    const player = this.$refs.mixPlayer;

    player.addEventListener('timeupdate', () => {
     this.mixCurrentTime = player.currentTime;
     });

      player.addEventListener('loadedmetadata', () => {
     this.mixDuration = player.duration; 
     });
  
  },

  methods: {
    unlockAutoPlay() {
      if (!this.userInteracted) {
        console.log('✅ Autoplay déverrouillé');
        this.userInteracted = true;
        
        document.removeEventListener('click', this.unlockAutoPlay);
        document.removeEventListener('touchstart', this.unlockAutoPlay);
        document.removeEventListener('keydown', this.unlockAutoPlay);

        if (this.isSongReady) {
          this.playAudio();
        }
      }
    },

    async playAudio() {
      if (!this.isSongReady) return;
      try {
        await this.wavesurfer.play();
        this.isPlaying = true;
        console.log('🎵 Lecture en cours...');
      } catch (e) {
        console.error('❌ Erreur playAudio():', e.message);
      }
    },

loadNextSong() {
  if (this.isLoading) return;

  this.isLoading = true;
  this.isSongReady = false;
  this.isPlaying = false;
  this.currentTime = '0:00';
  this.duration = '0:00';
  this.hasVoted = false;
  this.progressPercent = 0;
  this.imageUrl = ''; // ✅ Réinitialiser l'image

  axios.get(`/api/next-song?mode=${this.mode}`, { withCredentials: true })
    .then(async (res) => {
      const data = res.data;

      // ✅ Titre uniquement pour les MP3
      this.songName = this.mode === 'mp3' ? data.songName : '';

      this.songUrl = data.url;
      this.fileName = data.fileName;
      this.globalLikeCount = data.likeCount || 0;
      this.globalDislikeCount = data.dislikeCount || 0;
      this.waveformUrl = data.waveformUrl || '';

      // ✅ Charger l'image uniquement pour les MP3
      if (this.mode === 'mp3') {
        this.imageUrl = data.imageUrl || '';
      } else {
        this.imageUrl = ''; // Pas d'image pour les mix
      }

      let peaks = undefined;

      if (this.waveformUrl) {
        try {
          const r = await fetch(this.waveformUrl);
          const json = await r.json();
          if (Array.isArray(json) && json.length > 0) peaks = json;
        } catch (e) {
          console.warn('Impossible de charger le JSON waveform:', e);
        }
      }

      this.wavesurfer.un('ready');

      this.wavesurfer.once('ready', () => {
        this.isSongReady = true;
        this.duration = this.formatTime(this.wavesurfer.getDuration());
        this.isLoading = false;

        if (this.userInteracted) {
          setTimeout(() => this.playAudio(), 100);
        }
      });

      this.wavesurfer.load(this.songUrl, peaks);

    })
    .catch((e) => {
      console.error('❌ Erreur loadNextSong:', e);
      this.isLoading = false;
    });
},
loadPreviousSong() {
  if (this.isLoading) return;

  this.isLoading = true;
  this.isSongReady = false;
  this.isPlaying = false;
  this.currentTime = '0:00';
  this.duration = '0:00';
  this.hasVoted = false;
  this.progressPercent = 0;
  this.imageUrl = ''; // ✅ Réinitialiser l'image au début

  axios.get(`/api/previous-song?mode=${this.mode}`, { withCredentials: true })
    .then(async (res) => {
      const data = res.data;

      this.songName = this.mode === 'mp3' ? data.songName : ''; // Pas de titre pour mix
      this.songUrl = data.url;
      this.fileName = data.fileName;
      this.globalLikeCount = data.likeCount || 0;
      this.globalDislikeCount = data.dislikeCount || 0;
      this.waveformUrl = data.waveformUrl || '';
      
      // ✅ Charger l'image uniquement pour les MP3
      if (this.mode === 'mp3') {
        this.imageUrl = data.imageUrl || '';
      } else {
        this.imageUrl = ''; // Aucun fond pour les mix
      }

      let peaks = undefined;

      if (this.waveformUrl) {
        try {
          const r = await fetch(this.waveformUrl);
          const json = await r.json();
          if (Array.isArray(json) && json.length > 0) peaks = json;
        } catch (e) {
          console.warn('Impossible de charger le JSON waveform:', e);
        }
      }

      this.wavesurfer.un('ready');

      this.wavesurfer.once('ready', () => {
        this.isSongReady = true;
        this.duration = this.formatTime(this.wavesurfer.getDuration());
        this.isLoading = false;

        if (this.userInteracted) {
          setTimeout(() => this.playAudio(), 100);
        }
      });

      this.wavesurfer.load(this.songUrl, peaks);

    })
    .catch((e) => {
      console.error('❌ Erreur loadPreviousSong:', e);
      this.isLoading = false;
    });
},
    pauseAudio() {
      this.wavesurfer.pause();
      this.isPlaying = false;
    },

    togglePlay() {
      if (!this.isSongReady) return;
      if (this.isPlaying) this.pauseAudio();
      else this.playAudio();
    },

    async replaySong() {
      if (!this.isSongReady) return;
      this.wavesurfer.seekTo(0);
      this.progressPercent = 0;
      await this.playAudio();
    },

    nextSong() {
      if (this.isLoading) return;
      this.userInteracted = true;
      this.loadNextSong();
    },

    previousSong() {
      if (this.isLoading) return;
      this.userInteracted = true;
      this.loadPreviousSong();
    },

toggleMode() {
  // On change le mode
  this.mode = this.mode === 'mp3' ? 'mix' : 'mp3';

  if (this.mode === 'mp3') {
      this.$nextTick(() => {
      // Vue a recréé le div#waveform
      if (this.wavesurfer) {
        this.wavesurfer.container = document.getElementById('waveform');
        this.wavesurfer.drawBuffer();   // redraw la waveform
        this.wavesurfer.play();
        this.isPlaying = true;
      }
    });
   // if (this.wavesurfer) {
   //   this.wavesurfer.play();
   //   this.isPlaying = true;
   // }
  } else {
// si on passe en mix on arrête wavesurfer
    if (this.wavesurfer) {
      this.wavesurfer.pause();
    }
      this.isPlaying = false;
  }
},

    likeSong() {
      if (this.hasVoted) return;
      this.hasVoted = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'like' }, { withCredentials: true })
        .then(res => {
          this.globalLikeCount = res.data.likeCount || 0;
          this.globalDislikeCount = res.data.dislikeCount || 0;
        })
        .catch(err => {
          console.error('❌ Feedback like error:', err);
          this.hasVoted = false;
        });
    },

    dislikeSong() {
      if (this.hasVoted) return;
      this.hasVoted = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'dislike' }, { withCredentials: true })
        .then(res => {
          this.globalLikeCount = res.data.likeCount || 0;
          this.globalDislikeCount = res.data.dislikeCount || 0;
        })
        .catch(err => {
          console.error('❌ Feedback dislike error:', err);
          this.hasVoted = false;
        });
    },

  selectMix(mix) {
    this.currentMix = mix.fileName;
  },
    
playMix(url, mix) {
  const player = this.$refs.mixPlayer;

  // Si on clique sur le même mix déjà en cours
  if (this.currentMix === mix.fileName) {
    if (!player.paused) {
      // Mettre en pause
      player.pause();
      this.isPlaying = false;
    } else {
      // Reprendre la lecture
      player.play();
      this.isPlaying = true;
    }
    return;
  }

  // Sinon, changer de mix
  this.currentMix = mix.fileName;
  player.src = url;
  player.play();
  this.isPlaying = true;

  player.onended = () => {
    this.isPlaying = false;
  };
},
    
    formatTime(sec) {
      if (!sec || !isFinite(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s < 10 ? '0' + s : s}`;
    },
  }
}).mount('#app');
</script>
</body>
</html>
