<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Musica</title>
<link rel="icon" href="/musica-icon.png" />
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios@1.4.0/dist/axios.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
  }
  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    transition: background-color 0.5s, color 0.5s;
  }
  .song-title {
    font-size: 2em;
    margin: 20px 0;
  }
  #waveform {
    width: 100%;
    max-width: 800px;
    height: 120px;
    margin: 20px 0;
  }
  .controls button {
    margin: 5px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
  .feedback-buttons button:disabled {
    cursor: not-allowed;
    opacity: 0.6;
  }
  .mode-switch {
    position: absolute;
    top: 20px;
    right: 20px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="container" :style="{ backgroundColor: bgColor, color: textColor }">
    <div class="mode-switch">
      <button @click="toggleMode">
        {{ mode === 'mp3' ? 'Passer au Mode MIX' : 'Passer au Mode MP3' }}
      </button>
    </div>

    <h1 class="song-title">{{ songName }}</h1>

    <div id="waveform"></div>
    <div>{{ currentTime }} / {{ duration }}</div>

    <div class="controls">
      <button @click="fetchPreviousSong">⏮</button>
      <button @click="togglePlay">{{ isPlaying ? '⏸' : '▶' }}</button>
      <button @click="replaySong">↻</button>
      <button @click="fetchNextSong">⏭</button>
    </div>

    <div class="feedback-buttons">
      <button @click="likeSong" :disabled="hasVotedForCurrentSong">❤️ J'aime</button>
      <button @click="dislikeSong" :disabled="hasVotedForCurrentSong">👎 Pas intéressé</button>
    </div>
    <div>❤️ {{ globalLikeCount }} | 👎 {{ globalDislikeCount }}</div>
  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      songName: 'Chargement...',
      songUrl: '',
      waveformUrl: '',
      fileName: '',
      mode: 'mp3',
      isPlaying: false,
      isSongReady: false,
      isLoading: false,
      wavesurfer: null,
      currentTime: '0:00',
      duration: '0:00',
      hasVotedForCurrentSong: false,
      globalLikeCount: 0,
      globalDislikeCount: 0,
    };
  },
  mounted() {
    this.wavesurfer = WaveSurfer.create({
      container: '#waveform',
      waveColor: 'rgb(200,100,200)',
      progressColor: 'rgb(255,100,100)',
      barWidth: 2,
      height: 120,
      responsive: true,
    });

    this.wavesurfer.on('audioprocess', () => {
      if (this.isPlaying) {
        this.currentTime = this.formatTime(this.wavesurfer.getCurrentTime());
      }
    });

    this.wavesurfer.on('finish', () => {
      this.isPlaying = false;
      this.handleSongEnd();
    });

    this.fetchNextSong();
  },
  methods: {
    async fetchSongFromAPI(endpoint) {
      if (this.isLoading) return;
      this.isLoading = true;
      this.isSongReady = false;
      this.isPlaying = false;
      this.currentTime = '0:00';
      this.duration = '0:00';
      this.hasVotedForCurrentSong = false;

      try {
        const res = await axios.get(endpoint, { withCredentials: true });
        const data = res.data;

        this.songName = data.songName;
        this.songUrl = data.url;
        this.waveformUrl = data.waveformUrl || '';
        this.fileName = data.fileName;
        this.globalLikeCount = data.likeCount || 0;
        this.globalDislikeCount = data.dislikeCount || 0;

        this.wavesurfer.un('ready');
        this.wavesurfer.once('ready', () => {
          this.isSongReady = true;
          this.isLoading = false;
          this.duration = this.formatTime(this.wavesurfer.getDuration());
          this.wavesurfer.play();
          this.isPlaying = true;
        });

        if (this.waveformUrl) {
          this.wavesurfer.load(this.songUrl, this.waveformUrl);
        } else {
          // fallback sans waveform JSON
          this.wavesurfer.load(this.songUrl);
        }
      } catch (e) {
        console.error('Erreur fetchSongFromAPI:', e);
        this.isLoading = false;
      }
    },
    togglePlay() {
      if (!this.isSongReady) return;
      if (this.isPlaying) {
        this.wavesurfer.pause();
        this.isPlaying = false;
      } else {
        this.wavesurfer.play();
        this.isPlaying = true;
      }
    },
    replaySong() {
      if (!this.isSongReady) return;
      this.wavesurfer.seekTo(0);
      this.wavesurfer.play();
      this.isPlaying = true;
    },
    handleSongEnd() {
      this.fetchNextSong();
    },
    fetchNextSong() {
      this.fetchSongFromAPI(`/api/next-song?mode=${this.mode}`);
    },
    fetchPreviousSong() {
      this.fetchSongFromAPI(`/api/previous-song?mode=${this.mode}`);
    },
    toggleMode() {
      if (this.isLoading) return;
      this.mode = this.mode === 'mp3' ? 'mix' : 'mp3';
      this.fetchNextSong();
    },
    likeSong() {
      if (this.hasVotedForCurrentSong) return;
      this.hasVotedForCurrentSong = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'like' }, { withCredentials: true })
        .then(response => {
          this.globalLikeCount = response.data.likeCount || 0;
          this.globalDislikeCount = response.data.dislikeCount || 0;
        }).catch(error => {
          console.error('Feedback error:', error);
          this.hasVotedForCurrentSong = false;
        });
    },
    dislikeSong() {
      if (this.hasVotedForCurrentSong) return;
      this.hasVotedForCurrentSong = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'dislike' }, { withCredentials: true })
        .then(response => {
          this.globalLikeCount = response.data.likeCount || 0;
          this.globalDislikeCount = response.data.dislikeCount || 0;
        }).catch(error => {
          console.error('Feedback error:', error);
          this.hasVotedForCurrentSong = false;
        });
    },
    formatTime(seconds) {
      if (!seconds || !isFinite(seconds)) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' + s : s}`;
    },
  },
}).mount('#app');
</script>
</body>
</html>
