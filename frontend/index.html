<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Musica - Lecteur WaveSurfer</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios@1.4.0/dist/axios.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
  .container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
  .mode-switch { position: absolute; top: 20px; right: 20px; }
  
  .waveform-wrapper {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 250px;
    margin: 20px 0;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }
  
  #waveform { width: 100%; height: 100%; }
  
  .controls button { margin: 5px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <div class="container" :style="{ backgroundColor: bgColor, color: textColor }">
    <div class="mode-switch">
      <button @click="toggleMode" :disabled="isLoading">{{ mode === 'mp3' ? 'Passer au MIX' : 'Passer au MP3' }}</button>
    </div>

    <h1>{{ songName }}</h1>
    
    <!-- ✅ Waveform avec révélation image -->
    <div class="waveform-wrapper">
      <div id="waveform"></div>
    </div>
    
    <div>{{ currentTime }} / {{ duration }}</div>

    <div class="controls">
      <button @click="previousSong" :disabled="isLoading">⏮</button>
      <button @click="togglePlay" :disabled="!isSongReady || isLoading">{{ isPlaying ? '⏸' : '▶' }}</button>
      <button @click="replaySong" :disabled="!isSongReady || isLoading">↻</button>
      <button @click="nextSong" :disabled="isLoading">⏭</button>
    </div>

    <div class="feedback-buttons">
      <button @click="likeSong" :disabled="hasVoted">❤️ J'aime</button>
      <button @click="dislikeSong" :disabled="hasVoted">👎 Pas intéressé</button>
    </div>

    <div>❤️ {{ globalLikeCount }} | 👎 {{ globalDislikeCount }}</div>
  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      mode: 'mp3',
      songName: 'Chargement...',
      songUrl: '',
      waveformUrl: '',
      imageUrl: '',
      fileName: '',
      wavesurfer: null,
      isPlaying: false,
      isSongReady: false,
      isLoading: false,
      currentTime: '0:00',
      duration: '0:00',
      hasVoted: false,
      globalLikeCount: 0,
      globalDislikeCount: 0,
      bgColor: '#000',
      textColor: '#fff',
      userInteracted: false,
      albumImage: null,
    };
  },
  mounted() {
    this.wavesurfer = WaveSurfer.create({
      container: '#waveform',
      waveColor: '#b264b2',
      progressColor: '#ff6464',
      barWidth: 2,
      height: 250,
      responsive: true,
    });

    this.wavesurfer.on('audioprocess', () => {
      if (this.isPlaying) {
        this.currentTime = this.formatTime(this.wavesurfer.getCurrentTime());
        this.updateProgressColor();  // ✅ Mettre à jour la révélation
      }
    });

    this.wavesurfer.on('finish', () => {
      this.isPlaying = false;
      this.currentTime = this.duration;
      this.nextSong();
    });

    // ✅ Écouter le PREMIER clic/interaction ANYWHERE
    document.addEventListener('click', this.unlockAutoPlay);
    document.addEventListener('touchstart', this.unlockAutoPlay);

    this.loadNextSong();
  },

  methods: {
    // ✅ Au premier clic, déverrouiller l'autoplay
    unlockAutoPlay() {
      if (!this.userInteracted) {
        console.log('✅ Autoplay déverrouillé');
        this.userInteracted = true;
        
        document.removeEventListener('click', this.unlockAutoPlay);
        document.removeEventListener('touchstart', this.unlockAutoPlay);

        if (this.isSongReady) {
          this.playAudio();
        }
      }
    },

    // ✅ Révéler l'image progressivement
    updateProgressColor() {
      if (!this.albumImage || !this.wavesurfer) return;

      try {
        const duration = this.wavesurfer.getDuration();
        if (!duration) return;

        const progress = this.wavesurfer.getCurrentTime() / duration;
        
        const canvas = document.createElement('canvas');
        canvas.width = 900;
        canvas.height = 250;

        const ctx = canvas.getContext('2d');

        // Fond noir
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ✅ Afficher l'image sur la partie "progress"
        const progressWidth = canvas.width * progress;
        if (progressWidth > 0) {
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, 0, progressWidth, canvas.height);
          ctx.clip();
          
          // Calculer les dimensions pour que l'image fit bien
          const imgAspect = this.albumImage.width / this.albumImage.height;
          const canvasAspect = canvas.width / canvas.height;
          
          let drawWidth, drawHeight, drawX, drawY;
          
          if (imgAspect > canvasAspect) {
            drawHeight = canvas.height;
            drawWidth = drawHeight * imgAspect;
            drawX = (canvas.width - drawWidth) / 2;
            drawY = 0;
          } else {
            drawWidth = canvas.width;
            drawHeight = drawWidth / imgAspect;
            drawX = 0;
            drawY = (canvas.height - drawHeight) / 2;
          }
          
          ctx.drawImage(this.albumImage, drawX, drawY, drawWidth, drawHeight);
          ctx.restore();
        }

        // ✅ Dégradé de violet à transparent pour l'effet smooth
        const gradient = ctx.createLinearGradient(progressWidth - 50, 0, progressWidth, 0);
        gradient.addColorStop(0, 'rgba(255, 100, 100, 0.8)');
        gradient.addColorStop(1, 'rgba(178, 100, 178, 0)');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(Math.max(0, progressWidth - 100), 0, 100, canvas.height);

        // Mettre à jour le progressColor
        this.wavesurfer.setProgressColor(canvas.toDataURL());
      } catch (e) {
        console.error('Erreur updateProgressColor:', e);
      }
    },

    async playAudio() {
      if (!this.isSongReady) return;
      try {
        await this.wavesurfer.play();
        this.isPlaying = true;
        console.log('🎵 Lecture en cours...');
      } catch (e) {
        console.error('❌ Erreur playAudio():', e);
      }
    },

    loadNextSong() {
      this.isLoading = true;
      this.isSongReady = false;
      this.isPlaying = false;
      this.currentTime = '0:00';
      this.duration = '0:00';
      this.hasVoted = false;
      this.albumImage = null;

      axios.get(`/api/next-song?mode=${this.mode}`, { withCredentials: true })
        .then(async (res) => {
          const data = res.data;

          this.songName = data.songName;
          this.songUrl = data.url;
          this.fileName = data.fileName;
          this.globalLikeCount = data.likeCount || 0;
          this.globalDislikeCount = data.dislikeCount || 0;
          this.waveformUrl = data.waveformUrl || '';
          this.imageUrl = data.imageUrl || '';

          let peaks = undefined;

          if (this.waveformUrl) {
            try {
              const r = await fetch(this.waveformUrl);
              const json = await r.json();
              if (Array.isArray(json) && json.length > 0) peaks = json;
            } catch (e) {
              console.warn('Impossible de charger le JSON waveform:', e);
            }
          }

          // ✅ Charger l'image de la pochette
          if (this.imageUrl) {
            const img = new Image();
            img.onload = () => {
              this.albumImage = img;
              console.log('✅ Image pochette chargée');
            };
            img.onerror = () => console.warn('❌ Impossible de charger l\'image');
            img.src = this.imageUrl;
          }

          this.wavesurfer.un('ready');

          this.wavesurfer.once('ready', () => {
            console.log('✅ READY - Audio prêt à jouer');
            this.isSongReady = true;
            this.duration = this.formatTime(this.wavesurfer.getDuration());
            this.isLoading = false;

            if (this.userInteracted) {
              setTimeout(() => this.playAudio(), 100);
            }
          });

          this.wavesurfer.load(this.songUrl, peaks);
        })
        .catch((e) => {
          console.error('❌ Erreur loadNextSong:', e);
          this.isLoading = false;
        });
    },

    loadPreviousSong() {
      this.isLoading = true;
      this.isSongReady = false;
      this.isPlaying = false;
      this.currentTime = '0:00';
      this.duration = '0:00';
      this.hasVoted = false;
      this.albumImage = null;

      axios.get(`/api/previous-song?mode=${this.mode}`, { withCredentials: true })
        .then(async (res) => {
          const data = res.data;

          this.songName = data.songName;
          this.songUrl = data.url;
          this.fileName = data.fileName;
          this.globalLikeCount = data.likeCount || 0;
          this.globalDislikeCount = data.dislikeCount || 0;
          this.waveformUrl = data.waveformUrl || '';
          this.imageUrl = data.imageUrl || '';

          let peaks = undefined;

          if (this.waveformUrl) {
            try {
              const r = await fetch(this.waveformUrl);
              const json = await r.json();
              if (Array.isArray(json) && json.length > 0) peaks = json;
            } catch (e) {
              console.warn('Impossible de charger le JSON waveform:', e);
            }
          }

          // ✅ Charger l'image de la pochette
          if (this.imageUrl) {
            const img = new Image();
            img.onload = () => {
              this.albumImage = img;
              console.log('✅ Image pochette chargée');
            };
            img.onerror = () => console.warn('❌ Impossible de charger l\'image');
            img.src = this.imageUrl;
          }

          this.wavesurfer.un('ready');

          this.wavesurfer.once('ready', () => {
            console.log('✅ READY - Audio prêt à jouer');
            this.isSongReady = true;
            this.duration = this.formatTime(this.wavesurfer.getDuration());
            this.isLoading = false;

            if (this.userInteracted) {
              setTimeout(() => this.playAudio(), 100);
            }
          });

          this.wavesurfer.load(this.songUrl, peaks);
        })
        .catch((e) => {
          console.error('❌ Erreur loadPreviousSong:', e);
          this.isLoading = false;
        });
    },

    pauseAudio() {
      this.wavesurfer.pause();
      this.isPlaying = false;
    },

    togglePlay() {
      if (!this.isSongReady) return;
      if (this.isPlaying) this.pauseAudio();
      else this.playAudio();
    },

    async replaySong() {
      if (!this.isSongReady) return;
      this.wavesurfer.seekTo(0);
      await this.playAudio();
    },

    nextSong() {
      if (this.isLoading) return;
      this.userInteracted = true;
      this.loadNextSong();
    },

    previousSong() {
      if (this.isLoading) return;
      this.userInteracted = true;
      this.loadPreviousSong();
    },

    toggleMode() {
      if (this.isLoading) return;
      this.mode = this.mode === 'mp3' ? 'mix' : 'mp3';
      this.loadNextSong();
    },

    likeSong() {
      if (this.hasVoted) return;
      this.hasVoted = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'like' }, { withCredentials: true })
        .then(res => {
          this.globalLikeCount = res.data.likeCount || 0;
          this.globalDislikeCount = res.data.dislikeCount || 0;
        })
        .catch(err => {
          console.error('❌ Feedback like error:', err);
          this.hasVoted = false;
        });
    },

    dislikeSong() {
      if (this.hasVoted) return;
      this.hasVoted = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'dislike' }, { withCredentials: true })
        .then(res => {
          this.globalLikeCount = res.data.likeCount || 0;
          this.globalDislikeCount = res.data.dislikeCount || 0;
        })
        .catch(err => {
          console.error('❌ Feedback dislike error:', err);
          this.hasVoted = false;
        });
    },

    formatTime(sec) {
      if (!sec || !isFinite(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s < 10 ? '0' + s : s}`;
    },
  }
}).mount('#app');
</script>
</body>
</html>
