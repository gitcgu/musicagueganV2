<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Musica - Lecteur WaveSurfer</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios@1.4.0/dist/axios.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
  .container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
  .mode-switch { position: absolute; top: 20px; right: 20px; }
  
  .waveform-wrapper {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 250px;
    margin: 20px 0;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }
  
  .album-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 1;
    transition: clip-path 0.1s linear;
  }
  
  #waveform { 
    position: relative;
    width: 100%; 
    height: 100%;
    z-index: 2;
    opacity: 0.5;
    filter: grayscale(100%);
  }
  
  .controls button { margin: 5px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  /* NEW BOUTON ROND CONTROLS OVERLAY */
/* ----------- Player Controls Overlay ----------- */

/* conteneur des boutons */
.player-controls {
  position: absolute;            /* position par-dessus le waveform */
  top: 50%;                      /* centré verticalement */
  left: 50%;                     /* centré horizontalement */
  transform: translate(-50%, -50%); /* recentrage exact */
  display: flex;                 /* boutons alignés horizontalement */
  gap: 20px;                     /* espace entre boutons */
  z-index: 3;                    /* au-dessus de l'album et waveform */
  opacity: 0;                     /* invisible par défaut */
  transition: opacity 0.3s ease;  /* transition fluide pour apparaitre */
}

/* apparition au survol (PC uniquement) */
.waveform-wrapper:hover .player-controls {
  opacity: 1;
}

/* pour mobile : pas de hover, donc toujours visibles */
@media (hover: none) {
  .player-controls {
    opacity: 1;
  }
}

/* ----------- Styles des boutons ----------- */
.player-controls button {
  appearance: none;          /* ignore le style par défaut navigateur */
  -webkit-appearance: none;  /* version Safari / iOS */
  border: none;               /* pas de bord par défaut */
  border-radius: 50%;         /* boutons ronds */
  width: 55px;
  height: 55px;
  font-size: 20px;
  background: rgba(0,0,0,0.6); /* couleur de fond semi-transparente */
  color: white;               /* couleur du texte / icône */
  cursor: pointer;
  backdrop-filter: blur(5px); /* effet flou derrière le bouton */
  transition: all 0.2s ease;  /* transition fluide pour hover */
}

/* bouton play plus gros */
.player-controls .play-btn {
  width: 70px;
  height: 70px;
  font-size: 26px;
}

/* hover : effet léger sur PC */
.player-controls button:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.1);
}

/* état disabled */
.player-controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
</style>
</head>
<body>
<div id="app">
  <div class="container" :style="{ backgroundColor: bgColor, color: textColor }">
    <div class="mode-switch">  
<!--    <div class="mode-switch" v-if="false">    J'ai desactiver le bouton -->
      <button @click="toggleMode" :disabled="isLoading">{{ mode === 'mp3' ? 'Passer au MIX' : 'Passer au MP3' }}</button>
    </div>
<h1 v-if="mode === 'mp3'">{{ songName }}</h1>

<!-- Bloc Mp3 -->
<div v-if="mode === 'mp3'" class="waveform-wrapper"> 
  <div class="album-image"
       :style="{ 
         backgroundImage: `url('${imageUrl}')`,
         clipPath: `inset(0 ${100 - progressPercent}% 0 0)`
       }">
  </div>

  <div id="waveform"></div>

  <div>{{ currentTime }} / {{ duration }}</div>

  <!-- <div class="controls">   du à new bouton-->
  <div class="player-controls">
    <button @click="previousSong" :disabled="isLoading">⏮</button>
    <button class="play-btn" @click="togglePlay" :disabled="!isSongReady || isLoading">
      {{ isPlaying ? '⏸' : '▶' }}
    </button>
    <button @click="replaySong" :disabled="!isSongReady || isLoading">↻</button>
    <button @click="nextSong" :disabled="isLoading">⏭</button>
  </div>
</div>

<!-- Juste avant le bloc Mix -->
<audio ref="mixPlayer" style="display:none"></audio>
    
<!-- Bloc Mix -->
<div v-if="mode === 'mix'" style="width:100%; max-width:900px; margin-top:20px;">
  <div v-for="mix in mixList" :key="mix.fileName" style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #444;">
    <div>{{ mix.name }}</div>
    <button @click="playMix(mix)">
      {{ currentMix === mix.fileName && isPlaying ? '⏸' : '▶' }}
    </button>
  </div>
</div> 
<div>{{ currentTime }} / {{ duration }}</div>
<!--    <div  class="controls">
      <button @click="previousSong" :disabled="isLoading">⏮</button>
      <button @click="togglePlay" :disabled="!isSongReady || isLoading">{{ isPlaying ? '⏸' : '▶' }}</button>
      <button @click="replaySong" :disabled="!isSongReady || isLoading">↻</button>
      <button @click="nextSong" :disabled="isLoading">⏭</button>
    </div>  -->

    <div v-if="!userInteracted && isSongReady" style="margin: 10px 0; color: #999; font-size: 14px;">
      👆 Clique pour commencer
    </div>

    <div class="feedback-buttons">
      <button @click="likeSong" :disabled="hasVoted">❤️ J'aime</button>
      <button @click="dislikeSong" :disabled="hasVoted">👎 Pas intéressé</button>
    </div>

    <div>❤️ {{ globalLikeCount }} | 👎 {{ globalDislikeCount }}</div>
  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      mode: 'mp3',
      songName: 'Chargement...',
      songUrl: '',
      waveformUrl: '',
      imageUrl: '',
      fileName: '',
      wavesurfer: null,
      isPlaying: false,
      isSongReady: false,
      isLoading: false,
      currentTime: '0:00',
      duration: '0:00',
      hasVoted: false,
      globalLikeCount: 0,
      globalDislikeCount: 0,
      bgColor: '#000',
      textColor: '#fff',
      userInteracted: false,
      progressPercent: 0,
      mixList: [],      // la liste des mixes depuis /api/mix-list
currentMix: null, // le mix en cours
    };
  },
  mounted() {
    this.wavesurfer = WaveSurfer.create({
      container: '#waveform',
      waveColor: '#FFFFFF',
//      progressColor: 'rgba(255, 100, 100, 0.3)',
      progressColor: 'transparent',
      barWidth: 2,
      height: 250,
      responsive: true,
    });

    this.wavesurfer.on('audioprocess', () => {
      if (this.isPlaying) {
        this.currentTime = this.formatTime(this.wavesurfer.getCurrentTime());
        
        const duration = this.wavesurfer.getDuration();
        const currentTime = this.wavesurfer.getCurrentTime();
        if (duration > 0) {
          this.progressPercent = (currentTime / duration) * 100;
        }
      }
    });

    this.wavesurfer.on('finish', () => {
      this.isPlaying = false;
      this.currentTime = this.duration;
      this.progressPercent = 100;
      this.nextSong();
    });

    document.addEventListener('click', this.unlockAutoPlay);
    document.addEventListener('touchstart', this.unlockAutoPlay);
    document.addEventListener('keydown', this.unlockAutoPlay);

    this.loadNextSong();

     // 🔹 Charger la liste des mixes
  axios.get('/api/mix-list', { withCredentials: true })
    .then(res => {
      this.mixList = res.data;
    })
    .catch(err => console.error('Erreur /api/mix-list:', err));
  
  },

  methods: {
    unlockAutoPlay() {
      if (!this.userInteracted) {
        console.log('✅ Autoplay déverrouillé');
        this.userInteracted = true;
        
        document.removeEventListener('click', this.unlockAutoPlay);
        document.removeEventListener('touchstart', this.unlockAutoPlay);
        document.removeEventListener('keydown', this.unlockAutoPlay);

        if (this.isSongReady) {
          this.playAudio();
        }
      }
    },

    async playAudio() {
      if (!this.isSongReady) return;
      try {
        await this.wavesurfer.play();
        this.isPlaying = true;
        console.log('🎵 Lecture en cours...');
      } catch (e) {
        console.error('❌ Erreur playAudio():', e.message);
      }
    },

loadNextSong() {
  if (this.isLoading) return;

  this.isLoading = true;
  this.isSongReady = false;
  this.isPlaying = false;
  this.currentTime = '0:00';
  this.duration = '0:00';
  this.hasVoted = false;
  this.progressPercent = 0;
  this.imageUrl = ''; // ✅ Réinitialiser l'image

  axios.get(`/api/next-song?mode=${this.mode}`, { withCredentials: true })
    .then(async (res) => {
      const data = res.data;

      // ✅ Titre uniquement pour les MP3
      this.songName = this.mode === 'mp3' ? data.songName : '';

      this.songUrl = data.url;
      this.fileName = data.fileName;
      this.globalLikeCount = data.likeCount || 0;
      this.globalDislikeCount = data.dislikeCount || 0;
      this.waveformUrl = data.waveformUrl || '';

      // ✅ Charger l'image uniquement pour les MP3
      if (this.mode === 'mp3') {
        this.imageUrl = data.imageUrl || '';
      } else {
        this.imageUrl = ''; // Pas d'image pour les mix
      }

      let peaks = undefined;

      if (this.waveformUrl) {
        try {
          const r = await fetch(this.waveformUrl);
          const json = await r.json();
          if (Array.isArray(json) && json.length > 0) peaks = json;
        } catch (e) {
          console.warn('Impossible de charger le JSON waveform:', e);
        }
      }

      this.wavesurfer.un('ready');

      this.wavesurfer.once('ready', () => {
        this.isSongReady = true;
        this.duration = this.formatTime(this.wavesurfer.getDuration());
        this.isLoading = false;

        if (this.userInteracted) {
          setTimeout(() => this.playAudio(), 100);
        }
      });

      this.wavesurfer.load(this.songUrl, peaks);

    })
    .catch((e) => {
      console.error('❌ Erreur loadNextSong:', e);
      this.isLoading = false;
    });
},
loadPreviousSong() {
  if (this.isLoading) return;

  this.isLoading = true;
  this.isSongReady = false;
  this.isPlaying = false;
  this.currentTime = '0:00';
  this.duration = '0:00';
  this.hasVoted = false;
  this.progressPercent = 0;
  this.imageUrl = ''; // ✅ Réinitialiser l'image au début

  axios.get(`/api/previous-song?mode=${this.mode}`, { withCredentials: true })
    .then(async (res) => {
      const data = res.data;

      this.songName = this.mode === 'mp3' ? data.songName : ''; // Pas de titre pour mix
      this.songUrl = data.url;
      this.fileName = data.fileName;
      this.globalLikeCount = data.likeCount || 0;
      this.globalDislikeCount = data.dislikeCount || 0;
      this.waveformUrl = data.waveformUrl || '';
      
      // ✅ Charger l'image uniquement pour les MP3
      if (this.mode === 'mp3') {
        this.imageUrl = data.imageUrl || '';
      } else {
        this.imageUrl = ''; // Aucun fond pour les mix
      }

      let peaks = undefined;

      if (this.waveformUrl) {
        try {
          const r = await fetch(this.waveformUrl);
          const json = await r.json();
          if (Array.isArray(json) && json.length > 0) peaks = json;
        } catch (e) {
          console.warn('Impossible de charger le JSON waveform:', e);
        }
      }

      this.wavesurfer.un('ready');

      this.wavesurfer.once('ready', () => {
        this.isSongReady = true;
        this.duration = this.formatTime(this.wavesurfer.getDuration());
        this.isLoading = false;

        if (this.userInteracted) {
          setTimeout(() => this.playAudio(), 100);
        }
      });

      this.wavesurfer.load(this.songUrl, peaks);

    })
    .catch((e) => {
      console.error('❌ Erreur loadPreviousSong:', e);
      this.isLoading = false;
    });
},
    pauseAudio() {
      this.wavesurfer.pause();
      this.isPlaying = false;
    },

    togglePlay() {
      if (!this.isSongReady) return;
      if (this.isPlaying) this.pauseAudio();
      else this.playAudio();
    },

    async replaySong() {
      if (!this.isSongReady) return;
      this.wavesurfer.seekTo(0);
      this.progressPercent = 0;
      await this.playAudio();
    },

    nextSong() {
      if (this.isLoading) return;
      this.userInteracted = true;
      this.loadNextSong();
    },

    previousSong() {
      if (this.isLoading) return;
      this.userInteracted = true;
      this.loadPreviousSong();
    },

    toggleMode() {
      if (this.isLoading) return;
      this.mode = this.mode === 'mp3' ? 'mix' : 'mp3';
      this.loadNextSong();
    },

    likeSong() {
      if (this.hasVoted) return;
      this.hasVoted = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'like' }, { withCredentials: true })
        .then(res => {
          this.globalLikeCount = res.data.likeCount || 0;
          this.globalDislikeCount = res.data.dislikeCount || 0;
        })
        .catch(err => {
          console.error('❌ Feedback like error:', err);
          this.hasVoted = false;
        });
    },

    dislikeSong() {
      if (this.hasVoted) return;
      this.hasVoted = true;
      axios.post('/api/song-feedback', { songName: this.fileName, feedback: 'dislike' }, { withCredentials: true })
        .then(res => {
          this.globalLikeCount = res.data.likeCount || 0;
          this.globalDislikeCount = res.data.dislikeCount || 0;
        })
        .catch(err => {
          console.error('❌ Feedback dislike error:', err);
          this.hasVoted = false;
        });
    },

async playMix(mix) {
  const player = this.$refs.mixPlayer;

  if (this.currentMix === mix.fileName && this.isPlaying) {
    player.pause();
    this.isPlaying = false;
    return;
  }

  this.currentMix = mix.fileName;
  player.src = mix.url;
  await player.play();
  this.isPlaying = true;

  // Pour que le bouton affiche le bon état
  player.onended = () => {
    this.isPlaying = false;
  };
},
    
    formatTime(sec) {
      if (!sec || !isFinite(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s < 10 ? '0' + s : s}`;
    },
  }
}).mount('#app');
</script>
</body>
</html>
