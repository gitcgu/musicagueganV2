<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musica</title>
<link rel="icon" type="image/png" href="/musica-icon.png">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios@1.4.0/dist/axios.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js@6"></script>
<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; text-align:center; }
.container { min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px; box-sizing:border-box; position:relative; transition: background-color 0.5s, color 0.5s; }
.song-title { font-size:2em; margin:20px 0; }
#waveform { width:100%; max-width:800px; height:120px; margin:20px 0; }
.controls button { margin:5px; padding:10px 20px; font-size:16px; cursor:pointer; }
.feedback-buttons button:disabled { cursor: not-allowed; opacity:0.6; }
</style>
</head>
<body>
<div id="app">
  <div class="container" :style="{ backgroundColor:bgColor, color:textColor }">

    <div style="position:absolute; top:20px; right:20px;">
      <button @click="toggleMode">{{ mode==='mp3' ? 'Passer au Mix' : 'Passer au MP3' }}</button>
    </div>

    <h1 class="song-title">{{ songName }}</h1>

    <div id="waveform"></div>
    <div>{{ currentTime }} / {{ duration }}</div>

    <div class="controls">
      <button @click="handlePreviousClick" :disabled="!isSongReady">⏮</button>
      <button @click="togglePlay" :disabled="!isSongReady">{{ isPlaying ? '⏸' : '▶' }}</button>
      <button @click="replaySong" :disabled="!isSongReady">↻</button>
      <button @click="handleNextClick" :disabled="!isSongReady">⏭</button>
    </div>

    <div class="feedback-buttons">
      <button @click="likeSong" :disabled="hasVotedForCurrentSong">❤️ J'aime</button>
      <button @click="dislikeSong" :disabled="hasVotedForCurrentSong">👎 Pas intéressé</button>
    </div>
    <div>❤️ {{ globalLikeCount }} | 👎 {{ globalDislikeCount }}</div>

  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      songName: 'Chargement...',
      songUrl: '',
      waveformUrl: '',
      fileName: '',
      bgColor: '#000',
      textColor: '#FFF',
      mode: 'mp3',
      isPlaying: false,
      wavesurfer: null,
      isSongReady: false,
      currentTime: '0:00',
      duration: '0:00',
      globalLikeCount: 0,
      globalDislikeCount: 0,
      hasVotedForCurrentSong: false
    };
  },
  mounted() {
    this.wavesurfer = WaveSurfer.create({
      container: '#waveform',
      waveColor: 'rgb(200,100,200)',
      progressColor: 'rgb(255,100,100)',
      barWidth: 2,
      height: 120,
      responsive: true
    });

    this.wavesurfer.on('ready', () => {
      this.isSongReady = true;
      this.duration = this.formatTime(this.wavesurfer.getDuration());
      this.wavesurfer.play(); // autoplay dès que prêt
      this.isPlaying = true;
    });

    this.wavesurfer.on('audioprocess', () => {
      if(this.isPlaying) this.currentTime = this.formatTime(this.wavesurfer.getCurrentTime());
    });
    this.wavesurfer.on('finish', this.handleSongEnd);

    this.fetchNextSong();
  },
  methods: {
    stopAllAudio() {
      if(this.wavesurfer) this.wavesurfer.stop();
      this.isPlaying = false;
      this.isSongReady = false;
      this.currentTime = '0:00';
      this.duration = '0:00';
    },
    toggleMode() {
      this.stopAllAudio();
      this.mode = this.mode==='mp3' ? 'mix' : 'mp3';
      this.fetchNextSong();
    },
    togglePlay() {
      if(!this.isSongReady) return;
      this.wavesurfer.playPause();
      this.isPlaying = this.wavesurfer.isPlaying();
    },
    replaySong() {
      if(!this.isSongReady) return;
      this.wavesurfer.seekTo(0);
      this.wavesurfer.play();
      this.isPlaying = true;
    },
    async sendFeedbackToBackend(feedback) {
      if(this.hasVotedForCurrentSong) return;
      this.hasVotedForCurrentSong = true;
      try {
        const res = await axios.post('/api/song-feedback', { songName:this.fileName, feedback }, { withCredentials:true });
        this.globalLikeCount = res.data.likeCount || 0;
        this.globalDislikeCount = res.data.dislikeCount || 0;
      } catch(e) {
        console.error(e);
        this.hasVotedForCurrentSong = false;
      }
    },
    likeSong() { this.sendFeedbackToBackend('like'); },
    dislikeSong() { this.sendFeedbackToBackend('dislike'); },
    async fetchNextSong() { this.fetchSongFromAPI('/api/next-song?mode='+this.mode); },
    async fetchPreviousSong() { this.fetchSongFromAPI('/api/previous-song?mode='+this.mode); },
    async fetchSongFromAPI(endpoint) {
      this.stopAllAudio();
      try {
        const res = await axios.get(endpoint, { withCredentials:true });
        const data = res.data;
        this.songName = data.songName;
        this.songUrl = data.url;
        this.waveformUrl = data.waveformUrl;
        this.fileName = data.fileName;
        this.bgColor = data.color || '#000';
        this.textColor = data.textColor || '#FFF';
        this.globalLikeCount = data.likeCount || 0;
        this.globalDislikeCount = data.dislikeCount || 0;
        this.hasVotedForCurrentSong = false;

        this.$nextTick(()=>{
          this.wavesurfer.load(this.songUrl, this.waveformUrl);
        });
      } catch(e) {
        console.error('Erreur fetchSongFromAPI', e);
      }
    },
    handleSongEnd() { this.fetchNextSong(); },
    handleNextClick() { this.fetchNextSong(); },
    handlePreviousClick() { this.fetchPreviousSong(); },
    formatTime(sec) {
      if(!sec || !isFinite(sec)) return '0:00';
      const m = Math.floor(sec/60), s=Math.floor(sec%60);
      return `${m}:${s<10?'0'+s:s}`;
    }
  }
}).mount('#app');
</script>
</body>
</html>
